name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install markdown --quiet

      - name: Fetch market prices
        run: python3 scripts/fetch-prices.py

      - name: Fetch weather data
        if: ${{ env.METOFFICE_API_KEY != '' }}
        run: python3 scripts/fetch-weather.py
        env:
          METOFFICE_API_KEY: ${{ secrets.METOFFICE_API_KEY }}

      - name: Generate daily brief
        run: python3 scripts/generate-daily-brief.py

      - name: Commit updated data and brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ content/daily-brief.md
          git diff --staged --quiet || git commit -m "Daily update: $(date -u '+%Y-%m-%d %H:%M UTC')" && git push || true

      - name: Build site
        run: python3 scripts/build-site.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4