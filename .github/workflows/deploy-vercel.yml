name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      
      - name: Deploy to Vercel
        run: |
          vercel --prod --yes --token="$VERCEL_TOKEN" \
            --build-env ADSENSE_PUB_ID="$ADSENSE_PUB_ID" \
            --build-env ADSENSE_SLOT_HOME_TOP="$ADSENSE_SLOT_HOME_TOP" \
            --build-env ADSENSE_SLOT_HOME_MID="$ADSENSE_SLOT_HOME_MID" \
            --build-env ADSENSE_SLOT_SECTION_TOP="$ADSENSE_SLOT_SECTION_TOP" \
            --build-env ADSENSE_SLOT_ARTICLE_MID="$ADSENSE_SLOT_ARTICLE_MID"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          ADSENSE_PUB_ID: ${{ secrets.ADSENSE_PUB_ID }}
          ADSENSE_SLOT_HOME_TOP: ${{ secrets.ADSENSE_SLOT_HOME_TOP }}
          ADSENSE_SLOT_HOME_MID: ${{ secrets.ADSENSE_SLOT_HOME_MID }}
          ADSENSE_SLOT_SECTION_TOP: ${{ secrets.ADSENSE_SLOT_SECTION_TOP }}
          ADSENSE_SLOT_ARTICLE_MID: ${{ secrets.ADSENSE_SLOT_ARTICLE_MID }}
      
      - name: Notify Success
        if: success()
        run: echo "✅ Deployed to https://uk-farm-blog.vercel.app"
