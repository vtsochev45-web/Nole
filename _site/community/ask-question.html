<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://vtsochev45-web.github.io/Nole/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask a Question - UK Farm Community</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        label .required {
            color: #e74c3c;
        }
        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #1e3c72;
        }
        textarea {
            min-height: 150px;
            resize: vertical;
        }
        .hint {
            font-size: 0.9em;
            color: #888;
            margin-top: 5px;
        }
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: normal;
        }
        .btn {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30,60,114,0.3);
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #1e3c72;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❓ Ask a Question</h1>
        <p class="subtitle">Get answers from fellow UK farmers and our expert panel</p>
        
        <form id="questionForm">
            <div class="form-group">
                <label for="name">Your Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" required placeholder="e.g., John Smith">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
                <p class="hint">We'll notify you when someone answers. Never shared publicly.</p>
            </div>
            
            <div class="form-group">
                <label for="location">Your Location <span class="required">*</span></label>
                <select id="location" name="location" required>
                    <option value="">Select your region...</option>
                    <option value="england-southeast">England - South East</option>
                    <option value="england-southwest">England - South West</option>
                    <option value="england-midlands">England - Midlands</option>
                    <option value="england-north">England - North</option>
                    <option value="wales">Wales</option>
                    <option value="scotland">Scotland</option>
                    <option value="northern-ireland">Northern Ireland</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="category">Category <span class="required">*</span></label>
                <select id="category" name="category" required>
                    <option value="">Select category...</option>
                    <option value="grants-funding">Grants & Funding</option>
                    <option value="livestock">Livestock Management</option>
                    <option value="crops">Crops & Agronomy</option>
                    <option value="equipment">Equipment & Technology</option>
                    <option value="labour">Labour & Workers</option>
                    <option value="weather">Weather & Climate</option>
                    <option value="regulations">Regulations & Compliance</option>
                    <option value="business">Farm Business</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="title">Question Title <span class="required">*</span></label>
                <input type="text" id="title" name="title" required placeholder="e.g., What grant can I get for sheep fencing?" maxlength="150">
                <p class="hint">Keep it specific and clear</p>
            </div>
            
            <div class="form-group">
                <label for="details">Question Details <span class="required">*</span></label>
                <textarea id="details" name="details" required placeholder="Provide as much detail as possible:

• What type of farm do you have?
• What's your current situation?
• What have you tried already?
• What specific help do you need?

The more details, the better answers you'll get."></textarea>
                <p class="hint">Mention your farm size, location specifics, budget constraints, etc.</p>
            </div>
            
            <div class="form-group">
                <label>Would you like this question featured?</label>
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="featured" value="yes">
                        Yes, feature my question in the "Question of the Week" section
                    </label>
                </div>
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" name="expert" value="yes">
                    Request answer from our farming expert panel
                </label>
            </div>
            
            <button type="submit" class="btn">Submit Question</button>
            <p class="hint">Typical response time: 24-48 hours</p>
        </form>
        
        <a href="index.html" class="back-link">← Back to Community Hub</a>
    </div>
    
    <script>
        document.getElementById('questionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // For now, save to localStorage (in production, this would send to backend)
            const formData = new FormData(this);
            const question = {
                id: Date.now(),
                name: formData.get('name'),
                email: formData.get('email'),
                location: formData.get('location'),
                category: formData.get('category'),
                title: formData.get('title'),
                details: formData.get('details'),
                featured: formData.get('featured') === 'yes',
                expert: formData.get('expert') === 'yes',
                date: new Date().toISOString(),
                status: 'pending',
                answers: []
            };
            
            // Save to localStorage
            const questions = JSON.parse(localStorage.getItem('questions') || '[]');
            questions.push(question);
            localStorage.setItem('questions', JSON.stringify(questions));
            
            // Show confirmation
            alert('Thank you! Your question has been submitted. We\'ll notify you when someone answers.\n\nIn production, this would be sent to our moderation queue and then published.');
            
            // Reset form
            this.reset();
        });
    </script>
</body>
</html>
